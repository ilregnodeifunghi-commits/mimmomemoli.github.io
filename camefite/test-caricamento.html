<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Test Caricamento</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
    <h1>Test caricamento dati</h1>
  <div id="table-display">Caricamento in corso...</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
    // Usiamo ../ per tornare alla cartella principale (Root)
    const urlFile = "../Piante.csv"; 

    Papa.parse(urlFile, {
        download: true,
        delimiter: ";",
        header: true,
        complete: function(results) {
            const display = document.getElementById('table-display');
            if (results.data.length === 0) {
                display.innerHTML = "Nessun dato trovato nel file.";
                return;
            }

            // Inizia a creare la tabella
            let html = "<table style='width:100%; border-collapse:collapse; margin-top:20px;'>";
            
            // Crea l'intestazione basata sulle colonne del CSV
            const headers = Object.keys(results.data[0]);
            html += "<tr style='background:#f1f5f9;'>";
            headers.forEach(h => {
                html += "<th style='border:1px solid #ccc; padding:10px; text-align:left;'>" + h + "</th>";
            });
            html += "</tr>";

            // Crea le righe
            results.data.forEach(row => {
                html += "<tr>";
                headers.forEach(h => {
                    html += "<td style='border:1px solid #ccc; padding:8px;'>" + (row[h] || "") + "</td>";
                });
                html += "</tr>";
            });
            
            html += "</table>";
            display.innerHTML = html;
        },
        error: function(err) {
            document.getElementById('table-display').innerHTML = "Errore nel caricamento: " + err;
        }
    });
</script>
</body>
</html>
