<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Camefite Pulvinate (Ch pulv) - Flora della Campania</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f5; color: #1e293b; padding: 40px 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn-home { display: inline-block; padding: 12px 24px; background: #f59e0b; color: #1e293b; text-decoration: none; border-radius: 30px; font-weight: bold; margin-bottom: 25px; }
        h1 { color: #14532d; margin-bottom: 5px; }
        .descr { font-style: italic; color: #64748b; margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
        .flora-table { width: 100%; border-collapse: collapse; }
        .flora-table th { background: #f1f5f9; text-align: left; padding: 14px; border-bottom: 2px solid #cbd5e1; }
        .flora-table td { padding: 14px; border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body>
<div class="container">
    <a href="../index.html" class="btn-home">🏠 HOME</a>
    <h1>Camefite Pulvinate (Ch pulv)</h1>
    <p class="descr">Piante che formano cuscinetti compatti aderenti al suolo.</p>
    
    <table class="flora-table" id="tabella-piante">
        <thead>
            <tr><th>NOME SCIENTIFICO</th><th>NOME ITALIANO</th><th>SCHEDA</th></tr>
        </thead>
        <tbody id="corpo-tabella">
            </tbody>
    </table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
    const siglaDaCercare = "Ch pulv"; // <--- MODIFICA QUESTA SIGLA PER OGNI PAGINA

    Papa.parse("../Piante.csv", {
        download: true,
        delimiter: ";",
        header: true,
        complete: function(results) {
            const tbody = document.getElementById('corpo-tabella');
            const filtrati = results.data.filter(r => r["Forma biologica"] === siglaDaCercare);
            
            if(filtrati.length === 0) {
                tbody.innerHTML = "<tr><td colspan='3'>Nessuna pianta trovata con la sigla " + siglaDaCercare + "</td></tr>";
            } else {
                filtrati.forEach(row => {
                    tbody.innerHTML += `<tr>
                        <td><i>${row["Nome scientifico"]}</i></td>
                        <td>${row["Nome italiano"]}</td>
                        <td><a href="${row.Link}">Visualizza ➔</a></td>
                    </tr>`;
                });
            }
        }
    });
</script>
</body>
</html>
