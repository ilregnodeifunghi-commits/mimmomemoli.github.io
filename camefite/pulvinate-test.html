<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Piante Pulvinate!</title>
    <!-- Carichiamo PapaParse per leggere il CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
    <h1>Piante Pulvinate</h1>
    <div id="table-container">Caricamento in corso...</div>

    <script>
        // Questo è il link al tuo file CSV
        const urlFile = "Piante.csv";

        Papa.parse(urlFile, {
            download: true,
            delimiter: ";",
            skipEmptyLines: true,
            complete: function(results) {
                const container = document.getElementById('table-container');
                // Semplice visualizzazione dei dati
                let html = "<pre>" + JSON.stringify(results.data, null, 2) + "</pre>";
                container.innerHTML = html;
            },
            error: function(err) {
                document.getElementById('table-container').innerHTML = "Errore nel caricamento: " + err;
            }
        });
    </script>
</body>
</html>
